# Docker CI Pipeline - Converte Imagem API
# Build and push Docker image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker
---
trigger:
  branches:
    include:
      - master
      - development
  paths:
    include:
      - src/ConverteImagem.Api/*
      - ConverteImagemApi.sln
    exclude:
      - '*.md'
      - docs/*

pr:
  branches:
    include:
      - main
      - development
  paths:
    include:
      - src/ConverteImagem.Api/*
      - ConverteImagemApi.sln

resources:
  - repo: self

variables:
  # Build Configuration
  buildConfiguration: 'Release'
  dockerfilePath: '$(Build.SourcesDirectory)/src/ConverteImagem.Api/Dockerfile'
  buildContext: '$(Build.SourcesDirectory)/src/ConverteImagem.Api'

  # Container Registry
  containerRegistry: 'acr-seta'
  imageRepository: 'converte-imagem-api'

  # Tags
  tag: '$(Build.BuildId)'

  # Security
  DOCKER_BUILDKIT: 1

stages:
  - stage: Validate
    displayName: 'Validation'
    jobs:
      - job: Validate
        displayName: 'Validate Build'
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: |
              echo "Validating Dockerfile exists..."
              if [ ! -f "$(dockerfilePath)" ]; then
                echo "##vso[task.logissue type=error]Dockerfile not found at $(dockerfilePath)"
                exit 1
              fi
              echo "✅ Dockerfile validation passed"
            displayName: 'Validate Dockerfile'

  - stage: Build
    displayName: 'Build & Push to ACR'
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: BuildAndPush
        displayName: 'Build Docker Image'
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: |
              short_hash=$(echo "$(Build.SourceVersion)" | cut -c1-8)
              branch_name=$(echo "$(Build.SourceBranch)" | sed 's/refs\/heads\///' | sed 's/\//-/g')
              echo "##vso[task.setvariable variable=short_hash;]$short_hash"
              echo "##vso[task.setvariable variable=branch_name;]$branch_name"
              echo "Commit Hash: $short_hash"
              echo "Branch: $branch_name"
            displayName: 'Set Build Variables'

          - task: Docker@2
            displayName: 'Build and Push Image'
            inputs:
              command: buildAndPush
              dockerfile: $(dockerfilePath)
              buildContext: $(buildContext)
              repository: $(imageRepository)
              containerRegistry: $(containerRegistry)
              tags: |
                $(short_hash)
                $(branch_name)-latest
              arguments: '--build-arg BUILD_CONFIGURATION=$(buildConfiguration) --build-arg BUILD_NUMBER=$(tag)'

          - script: |
              echo "✅ Image successfully built and pushed!"
              echo "📦 Repository: $(imageRepository)"
              echo "🏷️  Tags:"
              echo "   - $(short_hash)"
              echo "   - $(branch_name)-latest"
              echo "🔗 Registry: $(containerRegistry)"
            displayName: 'Build Summary'
