trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - README.md
      - SECURITY.md

pr:
  branches:
    include:
      - main
      - develop

variables:
  - group: build
  - name: IMAGE_NAME
    value: mssql-mcp-server
  - name: PYTHON_VERSION
    value: "3.11"
  - name: dockerfilePath
    value: '$(Build.SourcesDirectory)/Dockerfile'
  - name: buildContext
    value: '$(Build.SourcesDirectory)/'
  # Override in pipeline settings or variable groups:
  - name: CONTAINER_REGISTRY
    value: "microvix.azurecr.io"
  - name: CONTAINER_REGISTRY_USER
    value: "microvix"
  - name: DOCKER_BUILDKIT
    value: 1

stages:
  - stage: Build
    displayName: "Build & Push"
    #dependsOn: Test
    #condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: DockerBuild
        displayName: "Podman build & push"
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: |
              echo "Validating Dockerfile exists..."
              if [ ! -f "$(dockerfilePath)" ]; then
                echo "##vso[task.logissue type=error]Dockerfile not found at $(dockerfilePath)"
                exit 1
              fi
              echo "✅ Dockerfile validation passed"
            displayName: 'Validate Dockerfile'

          - script: |
              errors=0
              for var_name in CONTAINER_REGISTRY CONTAINER_REGISTRY_USER CONTAINER_REGISTRY_PASSWORD; do
                value="${!var_name}"
                if [ -z "$value" ]; then
                  echo "##vso[task.logissue type=error]Required variable '$var_name' is not set or empty"
                  errors=$((errors + 1))
                else
                  echo "✅ $var_name is set"
                fi
              done
              [ $errors -eq 0 ] || exit 1
            displayName: 'Validate Variables'
            env:
              CONTAINER_REGISTRY: $(CONTAINER_REGISTRY)
              CONTAINER_REGISTRY_USER: $(CONTAINER_REGISTRY_USER)
              CONTAINER_REGISTRY_PASSWORD: $(CONTAINER_REGISTRY_PASSWORD)

          - script: |
              sudo apt-get update -y
              sudo apt-get install -y podman
            displayName: "Install Podman"

          - script: |
              short_hash=$(echo "$(Build.SourceVersion)" | cut -c1-8)
              branch_name=$(echo "$(Build.SourceBranch)" | sed 's/refs\/heads\///' | sed 's/\//-/g')
              echo "##vso[task.setvariable variable=short_hash;]$short_hash"
              echo "##vso[task.setvariable variable=branch_name;]$branch_name"
              echo "##vso[task.setvariable variable=imageRepository;]$(CONTAINER_REGISTRY)/$(IMAGE_NAME)"
              echo "##vso[task.setvariable variable=imageTagShort;]$short_hash"
              echo "##vso[task.setvariable variable=imageTagBranch;]$branch_name-latest"
              echo "Commit Hash: $short_hash"
              echo "Branch: $branch_name"
            displayName: 'Set Build Variables'

          - script: |
              sudo podman build \
                -f Dockerfile \
                -t $(imageRepository):$(imageTagShort) \
                -t $(imageRepository):$(imageTagBranch) \
                $(buildContext)
            displayName: "Build image with Podman"

          - script: |
              sudo podman login $(CONTAINER_REGISTRY) --username $(CONTAINER_REGISTRY_USER) --password $(CONTAINER_REGISTRY_PASSWORD)
              sudo podman push $(imageRepository):$(imageTagShort)
              sudo podman push $(imageRepository):$(imageTagBranch)
            env:
              CONTAINER_REGISTRY_PASSWORD: $(CONTAINER_REGISTRY_PASSWORD)
            displayName: "Push image to registry"

          - script: |
              echo "✅ Image successfully built and pushed!"
              echo "📦 Repository: $(imageRepository)"
              echo "🏷️  Tags:"
              echo "   - $(imageTagShort)"
              echo "   - $(imageTagBranch)"
              echo "🔗 Registry: $(CONTAINER_REGISTRY)"
            displayName: 'Build Summary'
